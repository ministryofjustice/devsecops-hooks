- id: baseline
  name: "🔐 Ministry of Justice - Security scanner"
  description: "Ministry of Justice pre-commit hook scan for hardcoded secrets and credentials using GitLeaks."
  entry: "ghcr.io/ministryofjustice/devsecops-hooks:v1.6.0"
  language: "docker_image"
  fail_fast: false
  always_run: true
  verbose: true
  pass_filenames: false
  stages:
    - pre-commit
  exclude: "^\\..*|/\\..*"

- id: commit
  name: "🔐 Ministry of Justice - Commit scanner"
  description: "Ministry of Justice pre-commit hook scan for conventional commit"
  entry: "ghcr.io/ministryofjustice/devsecops-hooks:v1.6.0 commit"
  language: "docker_image"
  fail_fast: true
  always_run: true
  verbose: true
  pass_filenames: true
  stages:
    - commit-msg
