name: Hooks
run-name: Hooks

on:
  pull_request:
    branches: ["**"]

permissions: {}

env:
  environment: base
  GITLEAKS_VERSION: "8.30.1"

jobs:
  hooks:
    permissions:
      contents: read

    name: Hooks
    runs-on: ubuntu-latest
    environment:
      name: ${{ env.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install gitleaks
        run: |
          set -euo pipefail

          FILE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          curl -sSfL -o "$FILE" "${BASE_URL}/${FILE}"
          curl -sSfL -o checksums.txt "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"

          # Verify binary against the official release checksums
          grep "$FILE" checksums.txt | sha256sum --check --status

          tar -xzf "$FILE" gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
          rm -f "$FILE" checksums.txt gitleaks

      - name: Install pre-commit
        run: pip install pre-commit==4.0.1

      - name: Run hooks
        run: pre-commit run --all-files
