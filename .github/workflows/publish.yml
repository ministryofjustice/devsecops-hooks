name: Release
run-name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

env:
  environment: base

jobs:
  release:
    permissions:
      contents: write
      issues: write
      pull-requests: write

    name: Release
    runs-on: ubuntu-latest
    environment:
      name: ${{ env.environment }}

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute release version
        if: github.event_name == 'workflow_dispatch'
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          current=$(jq -r '.["."]' .release-please-manifest.json)
          IFS='.' read -r major minor patch <<< "$current"
          case "$BUMP" in
            major) echo "release_as=$((major+1)).0.0" >> "$GITHUB_OUTPUT" ;;
            minor) echo "release_as=${major}.$((minor+1)).0" >> "$GITHUB_OUTPUT" ;;
            patch) echo "release_as=${major}.${minor}.$((patch+1))" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown bump type: $BUMP" >&2; exit 1 ;;
          esac

      - name: Release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          release-as: ${{ steps.version.outputs.release_as }}

  attest:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    name: Attest
    runs-on: ubuntu-latest
    environment:
      name: ${{ env.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: scripts/gitleaks.sh
